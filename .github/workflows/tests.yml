name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # MariaDB 10.4, matching production: the schema relies on MariaDB/MySQL-
    # specific DDL (generated columns, CHECK constraints, a BEFORE INSERT
    # trigger) that phpunit.xml's <php> block already points every test run
    # at (DB_DATABASE=gym2_testing, DB_USERNAME=root, empty DB_PASSWORD) —
    # this service just needs to satisfy those fixed values.
    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: gym2_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, bcmath, intl
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run test suite
        run: php artisan test
